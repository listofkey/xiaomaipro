name: xiaomaipro

x-backend-service: &backend-service
  restart: unless-stopped
  env_file:
    - ./.env
  networks:
    - xiaomai-net

services:
  proxy:
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-proxy:${APP_IMAGE_TAG:-latest}
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "${APP_HTTP_BIND_IP:-0.0.0.0}:${APP_HTTP_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - xiaomai-net

  gateway:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-gateway:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/gateway-api.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      user-rpc:
        condition: service_started
      program-rpc:
        condition: service_started
      order-rpc:
        condition: service_started
      payment-rpc:
        condition: service_started

  user-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-user-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/user.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  program-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-program-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/program.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-payment-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/payment.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-order-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/order.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-rpc:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  etcd:
    image: dyrnq/etcd:3.5.9-0
    container_name: xiaomai-etcd
    restart: unless-stopped
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-token=xiaomai-etcd-cluster
      - --initial-cluster-state=new
    ports:
      - "${ETCD_BIND_IP:-127.0.0.1}:${ETCD_CLIENT_PORT:-2379}:2379"
    volumes:
      - etcd_data:/etcd-data
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: xiaomai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./public.sql:/docker-entrypoint-initdb.d/001-public.sql:ro
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: xiaomai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: xiaomai-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${RABBITMQ_BIND_IP:-127.0.0.1}:${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_BIND_IP:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka:
    image: apache/kafka:3.9.2
    container_name: xiaomai-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_BIND_IP:-127.0.0.1}:${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://${KAFKA_EXTERNAL_ADVERTISED_HOST:-127.0.0.1}:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    image: apache/kafka:3.9.2
    container_name: xiaomai-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/bash
      - -ec
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:19092 \
          --create \
          --if-not-exists \
          --topic ${KAFKA_TOPIC:-xiaomaipro-order-create} \
          --partitions 1 \
          --replication-factor 1
    networks:
      - xiaomai-net

volumes:
  etcd_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  kafka_data:

networks:
  xiaomai-net:
    driver: bridge
