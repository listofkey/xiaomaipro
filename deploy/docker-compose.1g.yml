name: xiaomaipro

x-backend-service: &backend-service
  restart: unless-stopped
  env_file:
    - ./.env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - xiaomai-net

services:
  proxy:
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-proxy:${APP_IMAGE_TAG:-latest}
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "${APP_HTTP_BIND_IP:-0.0.0.0}:${APP_HTTP_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - xiaomai-net

  gateway:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-gateway:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/gateway-api.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      user-rpc:
        condition: service_started
      program-rpc:
        condition: service_started
      order-rpc:
        condition: service_started
      payment-rpc:
        condition: service_started

  user-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-user-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/user.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  program-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-program-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/program.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-payment-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/payment.yaml"]
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-rpc:
    <<: *backend-service
    image: ${DOCKERHUB_NAMESPACE}/xiaomaipro-order-rpc:${APP_IMAGE_TAG:-latest}
    command: ["-f", "/app/config/order.yaml"]
    environment:
      KAFKA_ENABLED: "false"
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-rpc:
        condition: service_started

  etcd:
    image: dyrnq/etcd:3.5.9-0
    container_name: xiaomai-etcd
    restart: unless-stopped
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-token=xiaomai-etcd-cluster
      - --initial-cluster-state=new
    ports:
      - "${ETCD_BIND_IP:-127.0.0.1}:${ETCD_CLIENT_PORT:-2379}:2379"
    volumes:
      - etcd_data:/etcd-data
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: xiaomai-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=256MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=20
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: xiaomai-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "no"
      - --save
      - ""
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - xiaomai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  etcd_data:
  postgres_data:
  redis_data:

networks:
  xiaomai-net:
    driver: bridge
