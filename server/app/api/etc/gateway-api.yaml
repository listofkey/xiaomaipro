Name: gateway-api
Host: 0.0.0.0
Port: 8080
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 19080
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: false
  HealthResponse: ok
Logging:
  Level: info
  Encoding: json
  Console: true
  Directory: logs
  Filename: gateway-api.log
  Logstash:
    Enabled: true
    Network: tcp
    Address: 127.0.0.1:5001
    ConnectTimeoutSeconds: 3
    WriteTimeoutSeconds: 3

UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc
  Timeout: 0

ProgramRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: program.rpc
  Timeout: 0
OrderRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: order.rpc
  Timeout: 0
PaymentRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: payment.rpc
  Timeout: 0
Timeout: 0
