syntax = "proto3";

package order;

option go_package = "./orderpb";

message OrderBuyerInfo {
  int64 id = 1;
  string name = 2;
  string id_card = 3;
  string phone = 4;
}

message OrderTicketInfo {
  int64 id = 1;
  int64 ticket_buyer_id = 2;
  string ticket_code = 3;
  string qr_code_url = 4;
  int32 status = 5;
  string seat_info = 6;
  string verified_at = 7;
  OrderBuyerInfo buyer = 8;
}

message OrderPaymentInfo {
  int64 id = 1;
  string payment_no = 2;
  int32 pay_method = 3;
  double amount = 4;
  int32 status = 5;
  string trade_no = 6;
  string paid_at = 7;
  string created_at = 8;
  string callback_data = 9;
}

message OrderRefundInfo {
  int64 id = 1;
  string refund_no = 2;
  double refund_amount = 3;
  int32 status = 4;
  string reason = 5;
  string reject_reason = 6;
  string trade_no = 7;
  string created_at = 8;
  string refunded_at = 9;
}

message OrderDeliveryInfo {
  int32 ticket_type = 1;
  string delivery_method = 2;
  int64 address_id = 3;
  string receiver_name = 4;
  string receiver_phone = 5;
  string province = 6;
  string city = 7;
  string district = 8;
  string detail = 9;
  string delivery_status = 10;
}

message OrderSummary {
  int64 id = 1;
  string order_no = 2;
  int64 event_id = 3;
  int64 ticket_tier_id = 4;
  string event_title = 5;
  string poster_url = 6;
  string venue_name = 7;
  string city = 8;
  string event_start_time = 9;
  string event_end_time = 10;
  string ticket_tier_name = 11;
  int32 quantity = 12;
  double unit_price = 13;
  double total_amount = 14;
  int32 status = 15;
  string status_text = 16;
  string pay_deadline = 17;
  string paid_at = 18;
  string cancelled_at = 19;
  string created_at = 20;
  int32 ticket_type = 21;
}

message OrderDetail {
  int64 id = 1;
  string order_no = 2;
  int64 user_id = 3;
  int64 event_id = 4;
  int64 ticket_tier_id = 5;
  string event_title = 6;
  string description = 7;
  string poster_url = 8;
  string venue_name = 9;
  string venue_address = 10;
  string city = 11;
  string event_start_time = 12;
  string event_end_time = 13;
  string sale_start_time = 14;
  string sale_end_time = 15;
  string ticket_tier_name = 16;
  int32 quantity = 17;
  double unit_price = 18;
  double total_amount = 19;
  int32 status = 20;
  string status_text = 21;
  string pay_deadline = 22;
  string paid_at = 23;
  string cancelled_at = 24;
  string created_at = 25;
  int32 purchase_limit = 26;
  int32 need_real_name = 27;
  int32 ticket_type = 28;
  OrderDeliveryInfo delivery = 29;
  repeated OrderTicketInfo tickets = 30;
  OrderPaymentInfo payment = 31;
  OrderRefundInfo refund = 32;
}

message CreateOrderReq {
  int64 user_id = 1;
  int64 event_id = 2;
  int64 ticket_tier_id = 3;
  int32 quantity = 4;
  repeated int64 ticket_buyer_ids = 5;
  int64 address_id = 6;
  int32 pay_method = 7;
  string request_id = 8;
}

message CreateOrderResp {
  string order_no = 1;
  string queue_token = 2;
  int32 queue_status = 3;
  string message = 4;
}

message GetQueueStatusReq {
  int64 user_id = 1;
  string queue_token = 2;
}

message GetQueueStatusResp {
  string queue_token = 1;
  string order_no = 2;
  int32 queue_status = 3;
  string message = 4;
  OrderSummary order = 5;
}

message PayOrderReq {
  int64 user_id = 1;
  string order_no = 2;
  int32 pay_method = 3;
  string channel = 4;
}

message PayOrderResp {
  bool success = 1;
  string pay_form = 2;
  OrderPaymentInfo payment = 3;
  int32 order_status = 4;
  string paid_at = 5;
  string checkout_url = 6;
  string checkout_session_id = 7;
  string session_expires_at = 8;
}

message CancelOrderReq {
  int64 user_id = 1;
  string order_no = 2;
}

message CancelOrderResp {
  bool success = 1;
  string order_no = 2;
}

message ApplyRefundReq {
  int64 user_id = 1;
  string order_no = 2;
  string reason = 3;
}

message ApplyRefundResp {
  bool success = 1;
  string order_no = 2;
  OrderRefundInfo refund = 3;
}

message ListOrderReq {
  int64 user_id = 1;
  int32 status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListOrderResp {
  repeated OrderSummary orders = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetOrderDetailReq {
  int64 user_id = 1;
  string order_no = 2;
}

message GetOrderDetailResp {
  OrderDetail order = 1;
}

message InventoryPreheatResult {
  int64 event_id = 1;
  int64 ticket_tier_id = 2;
  int32 stock = 3;
  bool success = 4;
  string message = 5;
}

message PreheatInventoryReq {
  repeated int64 event_ids = 1;
  bool force = 2;
}

message PreheatInventoryResp {
  repeated InventoryPreheatResult results = 1;
}

service OrderService {
  rpc PreheatInventory(PreheatInventoryReq) returns (PreheatInventoryResp);
  rpc CreateOrder(CreateOrderReq) returns (CreateOrderResp);
  rpc GetQueueStatus(GetQueueStatusReq) returns (GetQueueStatusResp);
  rpc PayOrder(PayOrderReq) returns (PayOrderResp);
  rpc CancelOrder(CancelOrderReq) returns (CancelOrderResp);
  rpc ApplyRefund(ApplyRefundReq) returns (ApplyRefundResp);
  rpc ListOrder(ListOrderReq) returns (ListOrderResp);
  rpc GetOrderDetail(GetOrderDetailReq) returns (GetOrderDetailResp);
}
