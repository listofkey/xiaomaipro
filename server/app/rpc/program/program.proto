syntax = "proto3";

package program;

option go_package = "./programpb";

message CategoryInfo {
  int32 id = 1;
  string name = 2;
  string icon = 3;
  int32 sort_order = 4;
  int32 status = 5;
}

message CityInfo {
  int64 id = 1;
  string name = 2;
}

message VenueInfo {
  int64 id = 1;
  string name = 2;
  string city = 3;
  string address = 4;
  int32 capacity = 5;
  string seat_map_url = 6;
  string description = 7;
}

message TicketTierInfo {
  int64 id = 1;
  int64 event_id = 2;
  string name = 3;
  double price = 4;
  int32 total_stock = 5;
  int32 sold_count = 6;
  int32 locked_count = 7;
  int32 status = 8;
  int32 sort_order = 9;
  int32 remain_stock = 10;
}

message EventBrief {
  int64 id = 1;
  string title = 2;
  string poster_url = 3;
  CategoryInfo category = 4;
  string venue_name = 5;
  string city = 6;
  string artist = 7;
  string event_start_time = 8;
  string event_end_time = 9;
  int32 status = 10;
  double min_price = 11;
  int32 ticket_type = 12;
  bool is_hot = 13;
}

message EventDetail {
  int64 id = 1;
  string title = 2;
  string description = 3;
  string poster_url = 4;
  CategoryInfo category = 5;
  VenueInfo venue = 6;
  string city = 7;
  string artist = 8;
  string event_start_time = 9;
  string event_end_time = 10;
  string sale_start_time = 11;
  string sale_end_time = 12;
  int32 status = 13;
  int32 purchase_limit = 14;
  int32 need_real_name = 15;
  int32 ticket_type = 16;
  repeated TicketTierInfo ticket_tiers = 17;
}

message ListEventReq {
  int32 page = 1;
  int32 page_size = 2;
  int32 category_id = 3;
  string city = 4;
  string start_date = 5;
  string end_date = 6;
  string sort_by = 7;
}

message ListEventResp {
  repeated EventBrief events = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetEventDetailReq {
  int64 event_id = 1;
}

message GetEventDetailResp {
  EventDetail event = 1;
}

message SearchEventReq {
  string keyword = 1;
  int32 category_id = 2;
  string city = 3;
  string start_date = 4;
  string end_date = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message SearchEventResp {
  repeated EventBrief events = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListCategoryReq {
  int32 status = 1;
}

message ListCategoryResp {
  repeated CategoryInfo categories = 1;
  repeated CityInfo cities = 2;
}

message GetHotRecommendReq {
  string city = 1;
  int32 limit = 2;
  int64 user_id = 3;
}

message GetHotRecommendResp {
  repeated EventBrief events = 1;
}

service ProgramService {
  rpc ListEvent(ListEventReq) returns (ListEventResp);
  rpc GetEventDetail(GetEventDetailReq) returns (GetEventDetailResp);
  rpc SearchEvent(SearchEventReq) returns (SearchEventResp);
  rpc ListCategory(ListCategoryReq) returns (ListCategoryResp);
  rpc GetHotRecommend(GetHotRecommendReq) returns (GetHotRecommendResp);
}
