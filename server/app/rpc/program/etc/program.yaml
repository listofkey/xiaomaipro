Name: program.rpc
ListenOn: 0.0.0.0:8082
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 19082
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: false
  HealthResponse: ok
Logging:
  Level: info
  Encoding: json
  Console: true
  Directory: logs
  Filename: program-rpc.log
  Logstash:
    Enabled: true
    Network: tcp
    Address: 127.0.0.1:5001
    ConnectTimeoutSeconds: 3
    WriteTimeoutSeconds: 3

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: program.rpc

DB:
  DSN: "host=127.0.0.1 user=root password=123456 dbname=xiaomaipro port=5432 sslmode=disable TimeZone=Asia/Shanghai"

RedisConfig:
  Host: 127.0.0.1:6379
  Password: ""
  DB: 0
