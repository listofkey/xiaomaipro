name: xiaomaipro-elk

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: xiaomaipro-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elk-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: xiaomaipro-logstash
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "5001:5001"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks:
      - elk-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: xiaomaipro-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
      SERVER_PUBLICBASEURL: http://localhost:5601
    ports:
      - "5601:5601"
    networks:
      - elk-net

  kibana-init:
    image: curlimages/curl:8.7.1
    container_name: xiaomaipro-kibana-init
    depends_on:
      - kibana
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until curl -fsS http://kibana:5601/api/status >/dev/null; do
          sleep 5
        done

        curl -fsS -X POST http://kibana:5601/api/data_views/data_view \
          -H 'kbn-xsrf: true' \
          -H 'Content-Type: application/json' \
          -d '{"data_view":{"title":"xiaomaipro-logs-*","name":"xiaomaipro logs","timeFieldName":"@timestamp"}}' \
          || true
    networks:
      - elk-net

volumes:
  elasticsearch_data:

networks:
  elk-net:
    driver: bridge
