Name: program.rpc
ListenOn: 0.0.0.0:8082
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 19082
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: false
  HealthResponse: ok

Etcd:
  Hosts:
    - "${ETCD_ENDPOINT}"
  Key: program.rpc

DB:
  DSN: "${POSTGRES_DSN}"

RedisConfig:
  Host: "${REDIS_ADDR}"
  Password: "${REDIS_PASSWORD}"
  DB: ${REDIS_DB}
