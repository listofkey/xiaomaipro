global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by:
    - alertname
    - service
    - dependency
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity=~"warning|info"
    equal:
      - alertname
      - service
