global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: xiaomaipro
    environment: local

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: prometheus

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          service: alertmanager

  - job_name: xiaomaipro-gateway
    static_configs:
      - targets:
          - host.docker.internal:19080
        labels:
          service: gateway

  - job_name: xiaomaipro-user
    static_configs:
      - targets:
          - host.docker.internal:19081
        labels:
          service: user

  - job_name: xiaomaipro-program
    static_configs:
      - targets:
          - host.docker.internal:19082
        labels:
          service: program

  - job_name: xiaomaipro-order
    static_configs:
      - targets:
          - host.docker.internal:19083
        labels:
          service: order

  - job_name: xiaomaipro-payment
    static_configs:
      - targets:
          - host.docker.internal:19084
        labels:
          service: payment
